# fly.toml app configuration file generated for axon-agent on 2026-05-17T15:35:41Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'axon-agent'
primary_region = 'cdg'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  strategy = 'rolling'

[env]
  NODE_ENV = 'production'
  POLL_INTERVAL_MS = '30000'
  WORKER_CONCURRENCY = '10'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = false
  min_machines_running = 1
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
