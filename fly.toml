# fly.toml app configuration file generated for axon-agent on 2026-05-17T15:35:41Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'axon-agent'
primary_region = 'cdg'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  strategy = 'rolling'

# axon-agent is a LiveKit Agents WORKER, not a web service. It connects
# OUTBOUND to LiveKit Cloud over a WebSocket and waits for room dispatches —
# it never serves inbound HTTP. The previous [http_service] on :8080 made
# Fly health-check a port nothing listens on; the checks failed and Fly
# SUSPENDED the app, so no agent ever joined a call room → "call connects,
# no voice, drops after ~5s". Removing it makes this a plain always-on
# worker (same model as the dialer app, which has no http_service and runs
# 24/7 fine). The machine stays running as long as `python agent.py start`
# is alive.

[processes]
  worker = 'python agent.py start'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
