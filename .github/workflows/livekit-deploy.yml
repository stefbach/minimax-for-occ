name: Deploy Voice Agent (LiveKit Cloud)

on:
  push:
    branches: [main]
    paths:
      - 'agent/**'
      - '.github/workflows/livekit-deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent

    steps:
      - uses: actions/checkout@v4

      - name: Install LiveKit CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          # Authenticated request to avoid the 60/hr unauth rate limit.
          RELEASE=$(curl -sfL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/livekit/livekit-cli/releases/latest)
          echo "$RELEASE" | head -c 500
          echo ""
          DOWNLOAD_URL=$(echo "$RELEASE" \
            | grep '"browser_download_url"' \
            | grep -i 'linux' \
            | grep -iE 'amd64|x86_64' \
            | grep -iE '\.tar\.gz|\.tgz' \
            | head -1 \
            | cut -d'"' -f4)
          if [ -z "$DOWNLOAD_URL" ]; then
            echo "ERROR: aucun asset linux amd64 .tar.gz trouve. Pin v2.7.2 (dernier connu OK) en fallback."
            DOWNLOAD_URL="https://github.com/livekit/livekit-cli/releases/download/v2.7.2/lk_2.7.2_linux_amd64.tar.gz"
          fi
          echo "Downloading: $DOWNLOAD_URL"
          curl -fSL -o /tmp/lk.tar.gz "$DOWNLOAD_URL"
          tar -xzf /tmp/lk.tar.gz -C /tmp
          find /tmp -maxdepth 2 -name 'lk' -type f | head -1 | xargs -I{} cp {} /usr/local/bin/lk
          chmod +x /usr/local/bin/lk
          lk --version

      - name: Deploy to LiveKit Cloud Agents
        run: lk agent deploy
        env:
          LIVEKIT_URL: ${{ secrets.LIVEKIT_URL }}
          LIVEKIT_API_KEY: ${{ secrets.LIVEKIT_API_KEY }}
          LIVEKIT_API_SECRET: ${{ secrets.LIVEKIT_API_SECRET }}
