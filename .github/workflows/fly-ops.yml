name: Fly Ops

# Diagnostic / opérations ponctuelles sur les apps Fly, déclenchées à la main
# (workflow_dispatch). Créé le 12/06/2026 pour diagnostiquer pourquoi le worker
# axon-agent enregistré sur LiveKit cesse de recevoir les dispatches quelques
# minutes après son démarrage (appels 10:29 et 10:32 sans agent dans la room).
# Le streaming `fly logs` côté client perd des lignes ; ce workflow récupère
# l'état machine + les logs côté serveur via le FLY_API_TOKEN des secrets.

on:
  workflow_dispatch:
    inputs:
      action:
        description: "diagnose | restart-agent | list-secrets | probe-dispatch | bench-deepseek | bench-anthropic | bench-lk-inference | check-replicate-schema | test-replicate-predict | tighten-watchdog | probe-replicate-import | check-agent-source | inspect-anthropic"
        required: true
        default: "diagnose"

jobs:
  ops:
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Machine state (axon-agent)
        if: ${{ github.event.inputs.action == 'diagnose' }}
        run: |
          echo "===== fly status -a axon-agent ====="
          flyctl status -a axon-agent || true
          echo ""
          echo "===== machine config (json) ====="
          flyctl machine list -a axon-agent --json > machines.json || true
          jq '.[] | {id, state, region, created_at, updated_at,
                     restart: .config.restart,
                     services: .config.services,
                     checks: .config.checks,
                     auto_destroy: .config.auto_destroy,
                     guest: .config.guest}' machines.json || cat machines.json

      - name: Server-side logs (axon-agent)
        if: ${{ github.event.inputs.action == 'diagnose' }}
        run: |
          echo "===== fly logs -a axon-agent (server-side, no-tail) ====="
          timeout 60 flyctl logs -a axon-agent --no-tail || true

      - name: Machine events + CPU/process state (axon-agent)
        if: ${{ github.event.inputs.action == 'diagnose' }}
        run: |
          echo "===== machine status (event history) ====="
          for id in $(flyctl machine list -a axon-agent --json | jq -r '.[].id'); do
            flyctl machine status "$id" -a axon-agent || true
          done
          echo ""
          echo "===== load average (in-machine) ====="
          timeout 60 flyctl ssh console -a axon-agent -C "cat /proc/loadavg" || true
          echo ""
          echo "===== processes (in-machine, via /proc) ====="
          timeout 60 flyctl ssh console -a axon-agent -C "python -c \"import os,glob; [print(p.split('/')[2], open(p).read().strip()[:120]) for p in glob.glob('/proc/[0-9]*/cmdline') if open(p).read().strip()]\"" || true
          echo ""
          echo "===== worker HTTP :8081 (event-loop alive?) ====="
          timeout 60 flyctl ssh console -a axon-agent -C "python -c \"import urllib.request; r=urllib.request.urlopen('http://127.0.0.1:8081/', timeout=5); print('HTTP', r.status, r.read()[:200])\"" || \
            echo "PROBE FAILED — worker event loop likely blocked or HTTP server down"

      - name: Server-side logs (dialer)
        if: ${{ github.event.inputs.action == 'diagnose' }}
        run: |
          echo "===== fly logs -a minimax-for-occ (server-side, no-tail) ====="
          timeout 60 flyctl logs -a minimax-for-occ --no-tail || true

      - name: LiveKit Cloud status + agent-name env
        if: ${{ github.event.inputs.action == 'diagnose' || github.event.inputs.action == 'probe-dispatch' }}
        run: |
          echo "===== status.livekit.io ====="
          curl -s --max-time 15 https://status.livekit.io/api/v2/summary.json | head -c 2000 || true
          echo ""
          echo "===== LIVEKIT_AGENT_NAME dans l'env de la machine agent ====="
          timeout 30 flyctl ssh console -a axon-agent -C "python -c \"import os; print('LIVEKIT_AGENT_NAME =', os.getenv('LIVEKIT_AGENT_NAME', '(non défini — défaut du code)'))\"" || true
          echo ""
          echo "===== Cles API critiques sur la machine agent (presence seule, valeur masquee) ====="
          BKEYS=""
          timeout 30 flyctl ssh console -a axon-agent -C "python -c \"import base64;exec(base64.b64decode('$BKEYS').decode())\"" || true

      - name: Probe dispatch (room de test, aucun appel téléphonique)
        if: ${{ github.event.inputs.action == 'probe-dispatch' }}
        run: |
          # Crée une room + un dispatch agent depuis la machine axon-agent
          # (clés LiveKit déjà dans son env) et vérifie si le worker reçoit
          # le job. Script passé en base64 pour éviter l'enfer du quoting.
          B64=""
          timeout 90 flyctl ssh console -a axon-agent -C "python -c \"import base64;exec(base64.b64decode('$B64').decode())\"" || true
          echo ""
          echo "===== logs worker pendant la sonde ====="
          timeout 30 flyctl logs -a axon-agent --no-tail | tail -30 || true

      - name: Bench DeepSeek TTFT (depuis la machine agent, réseau identique aux appels)
        if: ${{ github.event.inputs.action == 'bench-deepseek' }}
        run: |
          B64=""
          timeout 120 flyctl ssh console -a axon-agent -C "python -c \"import base64,os;os.environ['DSK']=os.environ.get('DEEPSEEK_API_KEY','');exec(base64.b64decode('$B64').decode())\"" || true

      - name: Bench LiveKit Inference (validation modeles + TTFT, zero appel)
        if: ${{ github.event.inputs.action == 'bench-lk-inference' }}
        run: |
          B64=""
          timeout 180 flyctl ssh console -a axon-agent -C "python -c \"import base64;exec(base64.b64decode('$B64').decode())\"" || true

      - name: Replicate schema check (input parameters of TTS models)
        if: ${{ github.event.inputs.action == 'check-replicate-schema' }}
        run: |
          BSCHEMA=""
          timeout 60 flyctl ssh console -a axon-agent -C "python -c \"import base64;exec(base64.b64decode('$BSCHEMA').decode())\"" || true

      - name: Replicate test prediction (debug voice_id behaviour)
        if: ${{ github.event.inputs.action == 'test-replicate-predict' }}
        run: |
          BTEST=""
          timeout 90 flyctl ssh console -a axon-agent -C "python -c \"import base64;exec(base64.b64decode('$BTEST').decode())\"" || true

      - name: Bench Anthropic (test API + plugin direct depuis le worker)
        if: ${{ github.event.inputs.action == 'bench-anthropic' }}
        run: |
          BANT=""
          timeout 120 flyctl ssh console -a axon-agent -C "python -c \"import base64;exec(base64.b64decode('$BANT').decode())\"" || true

      - name: Test replicate_tts import on worker
        if: ${{ github.event.inputs.action == 'probe-replicate-import' }}
        run: |
          BPR=""
          timeout 60 flyctl ssh console -a axon-agent -C "bash -c 'cd /app && python -c \"import base64;exec(base64.b64decode(\\\"$BPR\\\").decode())\"'" || true

      - name: Check agent.py on worker has replicate routing
        if: ${{ github.event.inputs.action == 'check-agent-source' }}
        run: |
          BAS=""
          timeout 30 flyctl ssh console -a axon-agent -C "python -c \"import base64;exec(base64.b64decode('$BAS').decode())\"" || true

      - name: Inspect Anthropic plugin signature (debug caching)
        if: ${{ github.event.inputs.action == 'inspect-anthropic' }}
        run: |
          BANT=""
          timeout 60 flyctl ssh console -a axon-agent -C "python -c \"import base64;exec(base64.b64decode('$BANT').decode())\"" || true

      - name: Tighten dispatch watchdog (probe interval 120s -> 30s)
        if: ${{ github.event.inputs.action == 'tighten-watchdog' }}
        run: |
          echo "Setting DISPATCH_PROBE_INTERVAL_SECS=30 on axon-agent…"
          flyctl secrets set DISPATCH_PROBE_INTERVAL_SECS=30 DISPATCH_PROBE_STARTUP_DELAY_SECS=60 -a axon-agent --stage=false
          echo ""
          echo "Done. Worker will restart and probe every 30s instead of 120s."
          echo "Window of undetected 'deaf' state: 60s max (vs 4min before)."

      - name: Restart agent machine
        if: ${{ github.event.inputs.action == 'restart-agent' }}
        run: |
          for id in $(flyctl machine list -a axon-agent --json | jq -r '.[].id'); do
            echo "restarting machine $id"
            flyctl machine restart "$id" -a axon-agent
          done

      - name: List secret names (axon-agent)
        if: ${{ github.event.inputs.action == 'list-secrets' }}
        run: |
          echo "===== secrets on axon-agent (names only) ====="
          flyctl secrets list -a axon-agent || true
          echo ""
          echo "===== critical-key presence check ====="
          flyctl secrets list -a axon-agent --json > /tmp/sec.json || true
          for k in DEEPSEEK_API_KEY ANTHROPIC_API_KEY CLAUDE_API_KEY OPENAI_API_KEY CARTESIA_API_KEY REPLICATE_API_TOKEN ASSEMBLYAI_API_KEY MINIMAX_API_KEY LIVEKIT_API_KEY LIVEKIT_API_SECRET SUPABASE_SERVICE_ROLE_KEY; do
            if jq -e ".[] | select(.Name == \"$k\")" /tmp/sec.json > /dev/null 2>&1; then
              echo "  ✓ $k"
            else
              echo "  ✗ $k  MISSING"
            fi
          done
