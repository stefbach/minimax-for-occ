name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  web-tests:
    name: web (vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run unit tests
        run: npm test -- --reporter=verbose
