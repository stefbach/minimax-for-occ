name: Evening Slot Monitor (Wati 15/06)

# Surveille le créneau du soir UK (~17:00–22:00 UTC = 18:00–23:00 BST) en
# capturant un snapshot des appels passés depuis le début du créneau,
# toutes les 20 minutes. Les résultats restent dans les Action logs ;
# Wati pourra les consulter le matin avec le rapport d'audit séparé.
#
# La requête tape Supabase via la fonction REST et ne déclenche AUCUN
# appel téléphonique. Aucun impact sur la prod — c'est de l'observation.

on:
  schedule:
    # Toutes les 20 minutes entre 17:00 et 22:00 UTC (cron en UTC).
    # GitHub limite la précision à 5 min ; on prend des points fixes.
    - cron: "0,20,40 17 * * *"
    - cron: "0,20,40 18 * * *"
    - cron: "0,20,40 19 * * *"
    - cron: "0,20,40 20 * * *"
    - cron: "0,20,40 21 * * *"
    - cron: "30 22 * * *"  # snapshot final post-créneau
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Query Supabase for evening-slot call stats
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -eo pipefail
          BSTAT=""
          python3 -c "import base64;exec(base64.b64decode('$BSTAT').decode())"
