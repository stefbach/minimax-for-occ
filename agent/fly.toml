app = "axon-agent"
# Region: CDG (Paris).
# Tried SIN (Singapore) on the assumption that DeepSeek (LLM) and MiniMax
# (TTS) being "in China" would respond faster from SIN — they didn't:
#   • LLM-TTFT 982ms (CDG, cache hit) → 1390ms (SIN, cache hit) = +408ms
#   • Deepgram (STT) US/EU edge gets further away from SIN → +350ms
#   • LiveKit cloud routed the worker to "India South" → audio path
#     Twilio UK ↔ India added ~150ms one-way
# Net regression of ~500ms per turn. Reverted. Don't re-try SIN without
# first confirming DeepSeek and Deepgram have low-latency Asia POPs.
primary_region = "cdg"

# Build the Python LiveKit Agents worker from agent/Dockerfile, with the build
# context = this agent/ directory (so its COPY requirements.txt / COPY *.py
# resolve). Deployed via the fly-deploy workflow with working-directory: agent.
[build]
  dockerfile = "Dockerfile"

# Voice agents are memory- AND cpu-hungry: the LiveKit Agents worker spins up
# an inference executor (Silero VAD, turn detector), decodes/encodes audio via
# PyAV, and runs streaming STT/LLM/TTS concurrently. June 10 production logs
# showed the 2 GB plan getting OOM-killed under real prospection load —
# livekit-agents 1.5.16 leaks RecorderIO objects ("Cannot create the
# AgentSession report, the RecorderIO is still recording"), and every leaked
# session keeps audio buffers alive. The compounding hit OOM after a few
# minutes; the resulting 65 s worker restart left dozens of SIP calls
# landing on an uninitialised worker — agent silent, 0 STT transcripts
# (Marina Gorton, Sue Thomas, Amy Luke-Telford, Inna Georgeta, Leann
# Williams). 4 GB gives enough headroom to absorb the leak between OOMs
# while we work on a 1.5.16 upgrade or explicit recorder cleanup.
[[vm]]
  size = "shared-cpu-2x"
  memory = "4096mb"

# Pure outbound worker — connects to LiveKit Cloud and waits for room
# dispatches. No [http_service]: nothing listens on an inbound port, and a
# bogus http health-check is exactly what got this app suspended before.
[processes]
  worker = "python agent.py start"

# NOTE: keep-warm settings (auto_stop_machines, min_machines_running) are
# NOT valid at the root level of fly.toml for non-[http_service] apps —
# adding them causes "cannot unmarshal bool into Config.processes" and
# blocks every deploy. They are configured via the Fly Machines UI:
#   Dashboard → axon-agent → Machines → click machine → Auto-stop = off
# and the app-level Scale count = 1.

[deploy]
  strategy = "rolling"
