app = "axon-agent"
# Region: CDG (Paris).
# Tried SIN (Singapore) on the assumption that DeepSeek (LLM) and MiniMax
# (TTS) being "in China" would respond faster from SIN — they didn't:
#   • LLM-TTFT 982ms (CDG, cache hit) → 1390ms (SIN, cache hit) = +408ms
#   • Deepgram (STT) US/EU edge gets further away from SIN → +350ms
#   • LiveKit cloud routed the worker to "India South" → audio path
#     Twilio UK ↔ India added ~150ms one-way
# Net regression of ~500ms per turn. Reverted. Don't re-try SIN without
# first confirming DeepSeek and Deepgram have low-latency Asia POPs.
primary_region = "cdg"

# Build the Python LiveKit Agents worker from agent/Dockerfile, with the build
# context = this agent/ directory (so its COPY requirements.txt / COPY *.py
# resolve). Deployed via the fly-deploy workflow with working-directory: agent.
[build]
  dockerfile = "Dockerfile"

# Voice agents are memory- AND cpu-hungry: the LiveKit Agents worker spins up
# an inference executor (Silero VAD, turn detector), decodes/encodes audio via
# PyAV, and runs streaming STT/LLM/TTS concurrently. At 512MB the process was
# OOM-killed during model load before it could even register with LiveKit
# ("Out of memory: Killed process", worker id=unregistered) → no agent joined
# the call → silence. Bump to 2 vCPU / 2GB for real-time headroom.
#
# Note: silero VAD occasionally logs "inference is slower than realtime,
# delay: 700ms" on this plan, but the practical per-turn impact (visible in
# the EOU metric) seems modest (~100-300ms). performance-2x ($35/mo extra)
# would eliminate it — kept off until/unless we run out of software knobs.
[[vm]]
  size = "shared-cpu-2x"
  memory = "2048mb"

# Pure outbound worker — connects to LiveKit Cloud and waits for room
# dispatches. No [http_service]: nothing listens on an inbound port, and a
# bogus http health-check is exactly what got this app suspended before.
[processes]
  worker = "python agent.py start"

# Keep at least one worker permanently warm. Without this, Fly's default
# autostop kicks in after ~minutes of idle and the next inbound call eats
# 5-8s of cold-start (process boot + agent load + tools build) before the
# greeting plays — callers say "Hello?" thinking the line is dead.
auto_stop_machines = "off"
auto_start_machines = true
min_machines_running = 1

[deploy]
  strategy = "rolling"
